<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/Satish.css">

<body class="satish-page has-scrolling-name" data-page="Satish">
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="Dinesh.html">Dinesh</a>
      <a href="Jyothi.html">Jyothi</a>
      <a href="Santhosh.html">Santhosh</a>
      <a href="Satish.html">Satish</a>
    </nav>
  </header>

  <main class="poster">
    <header class="poster__intro" aria-label="Poster introduction">
      <span class="poster__intro-brand">DILSHAJ INFOTECH</span>
      <span class="poster__intro-presents">PRESENTS</span>
    </header>

    <section class="poster__title" aria-labelledby="poster-main-title">
      <h1 class="poster__title-heading" id="poster-main-title">
        <span class="poster__title-summer">SUMMER</span>
        <span class="poster__title-internship">INTERNSHIP</span>
        <span class="poster__title-program">PROGRAM</span>
      </h1>
    </section>

    <section class="poster__tagline" aria-label="Program benefits">
      <p>GAIN EXPERIENCE &bull; LEARN NEW SKILLS &bull; BOOST YOUR CAREER</p>
    </section>

    <section class="poster__cta" aria-label="Call to action">
      <div class="poster__cta-top">JOIN OUR</div>
      <div class="poster__cta-bottom">INTERNSHIP!</div>
    </section>

    <section class="poster__characters" aria-label="Internship visuals">
      <figure class="poster__character poster__character--left">
        <img src="images/poster2images/man.png" alt="Professional man holding a laptop">
      </figure>

      <div class="poster__characters-center" aria-hidden="true"></div>

      <figure class="poster__character poster__character--right">
        <img src="images/poster2images/woman.png" alt="Professional woman holding a tablet">
      </figure>
    </section>

    <footer class="poster__footer">
      <section class="poster__benefits" aria-label="Internship highlights">
        <article class="poster__benefit">
          <span class="poster__benefit-icon" aria-hidden="true">[icon]</span>
          <p class="poster__benefit-text">CERTIFICATE PROVIDED</p>
        </article>

        <article class="poster__benefit">
          <span class="poster__benefit-icon" aria-hidden="true">[icon]</span>
          <p class="poster__benefit-text">HANDS-ON TRAINING</p>
        </article>

        <article class="poster__benefit">
          <span class="poster__benefit-icon" aria-hidden="true">[icon]</span>
          <p class="poster__benefit-text">LIMITED SPOTS AVAILABLE</p>
        </article>
      </section>

      <a class="poster__footer-link" href="https://www.dilshajinfotech.com/">
        www.dilshajinfotech.com
      </a>
    </footer>
  </main>
